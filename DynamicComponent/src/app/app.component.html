<p-toast position="top-right"></p-toast>

<nav class="navbar navbar-light bg-light border-bottom">
  <div class="container">
    <a class="navbar-brand" routerLink="/">DynamicComponent</a>
    <div class="d-flex align-items-center">
      <a class="btn btn-outline-primary btn-sm mr-2" routerLink="/products">Products</a>
      <a class="btn btn-outline-secondary btn-sm" routerLink="/form-builder">Form Builder</a>
      <app-cart-count></app-cart-count>
      <ng-container *ngIf="currentUser$ | async as user; else guestLinks">
        <a class="btn btn-outline-success btn-sm mr-2" routerLink="/auth/welcome">Welcome</a>
        <button class="btn btn-outline-danger btn-sm" type="button" (click)="logout()">Logout</button>
      </ng-container>
      <ng-template #guestLinks>
        <a class="btn btn-outline-success btn-sm mr-2" routerLink="/auth/login">Login</a>
        <a class="btn btn-outline-info btn-sm" routerLink="/auth/signup">Signup</a>
      </ng-template>
    </div>
  </div>
</nav>

<main class="container py-4">
  <router-outlet></router-outlet>
</main>

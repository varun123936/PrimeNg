<div style="margin-bottom:15px" [formGroup]="form">

  <label>{{field.label}}</label>

  <div [ngSwitch]="field.type">

    <!-- TEXT -->
    <input
 *ngSwitchCase="'text'"
 type="text"
 [formControlName]="field.name"
 [placeholder]="field.placeholder"
>

    <!-- NUMBER -->
    <input
 *ngSwitchCase="'number'"
 type="number"
 [formControlName]="field.name"
>

    <!-- EMAIL -->
    <input
 *ngSwitchCase="'email'"
 type="email"
 [formControlName]="field.name"
>

    <!-- DATE -->
    <input
 *ngSwitchCase="'email'"
 type="email"
 [formControlName]="field.name"
>

    <!-- TEXTAREA -->
    <textarea
 *ngSwitchCase="'textarea'"
 [formControlName]="field.name"
></textarea>

<!-- SELECT -->
<select
  *ngSwitchCase="'select'"
  [formControlName]="field.name"
>

  <option *ngFor="let option of field.options" [value]="option">
    {{option}}
  </option>

</select>

<!-- CHECKBOX -->
<input
  *ngSwitchCase="'checkbox'"
  type="checkbox"
  [formControlName]="field.name"
/>

<!-- RADIO -->
<div *ngSwitchCase="'radio'">

  <label *ngFor="let option of field.options">

    <input
      type="radio"
      [formControlName]="field.name"
      [value]="option"
    >

    {{option}}

  </label>

</div>

  </div>

</div>

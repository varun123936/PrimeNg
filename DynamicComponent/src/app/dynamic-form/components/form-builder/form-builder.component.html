<form [formGroup]="form" (ngSubmit)="submitForm()">

  <app-field-selector
    (fieldAdded)="addField($event)"
  >
  </app-field-selector>

  <hr>

  <h3>Generated Form</h3>

  <app-dynamic-field
  *ngFor="let field of fields"
  [field]="field"
  [form]="form"
>
</app-dynamic-field>

  <br>

  <button type="submit">

    Submit Form

  </button>

</form>

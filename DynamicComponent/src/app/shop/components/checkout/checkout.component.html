<div class="d-flex align-items-center justify-content-between mb-3 flex-wrap">
  <div>
    <h2 class="mb-1">Checkout</h2>
    <p class="text-muted mb-0">Confirm your order details</p>
  </div>
</div>

<div *ngIf="orderPlaced" class="alert alert-success">
  Order placed successfully. Thank you!
</div>

<div class="row">
  <div class="col-12 col-lg-7 mb-4 mb-lg-0">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title mb-3">Shipping Details</h5>
        <form>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input id="name" type="text" class="form-control" placeholder="John Doe" />
          </div>
          <div class="form-group">
            <label for="address">Address</label>
            <input id="address" type="text" class="form-control" placeholder="123 Main St" />
          </div>
          <div class="form-row">
            <div class="form-group col-md-6">
              <label for="city">City</label>
              <input id="city" type="text" class="form-control" placeholder="New York" />
            </div>
            <div class="form-group col-md-6">
              <label for="zip">Zip</label>
              <input id="zip" type="text" class="form-control" placeholder="10001" />
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="col-12 col-lg-5">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title mb-3">Order Summary</h5>
        <div *ngIf="(items$ | async) as items">
          <div *ngIf="items.length === 0" class="text-muted">Your cart is empty.</div>
          <div *ngIf="items.length > 0">
            <div class="summary-item" *ngFor="let item of items">
              <div class="summary-title">{{ item.product.title }}</div>
              <div class="summary-meta">
                Qty {{ item.quantity }} • ${{ (item.product.price * item.quantity) | number:'1.2-2' }}
              </div>
            </div>
            <div class="summary-total">
              Total: ${{ (total$ | async) | number:'1.2-2' }}
            </div>
            <button class="btn btn-primary btn-block mt-3" (click)="placeOrder()">Place Order</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

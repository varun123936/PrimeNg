<div class="mb-3">
  <button class="btn btn-link px-0" (click)="goBack()">
    <i class="pi pi-arrow-left mr-2"></i>
    Back to products
  </button>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">
  {{ errorMessage }}
</div>

<div *ngIf="isLoading" class="text-center py-5">
  <span class="spinner-border text-primary" role="status" aria-hidden="true"></span>
  <div class="mt-2 text-muted">Loading product details...</div>
</div>

<div *ngIf="!isLoading && product" class="row">
  <div class="col-12 col-lg-5 mb-4 mb-lg-0">
    <div class="product-detail-image">
      <img [src]="product.image" [alt]="product.title" />
    </div>
  </div>
  <div class="col-12 col-lg-7">
    <p-card>
      <ng-template pTemplate="title">
        {{ product.title }}
      </ng-template>
      <ng-template pTemplate="content">
        <div class="product-detail-price mb-3">${{ product.price | number:'1.2-2' }}</div>
        <div class="text-muted mb-3">{{ product.description }}</div>
        <div class="badge badge-light text-uppercase">{{ product.category }}</div>
        <div *ngIf="product.rating" class="mt-3 text-muted">
          Rating: {{ product.rating.rate }} ({{ product.rating.count }} reviews)
        </div>
      </ng-template>
      <ng-template pTemplate="footer">
        <button pButton type="button" label="Add to cart" class="p-button-sm" (click)="addToCart()"></button>
        <div *ngIf="addedToCart" class="small text-success mt-2">
          Added to cart.
        </div>
      </ng-template>
    </p-card>
  </div>
</div>

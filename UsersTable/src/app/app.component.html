<div class="table-header">
  <h2>User List</h2>
  <button
    pButton
    type="button"
    label="Add User"
    icon="pi pi-plus"
    class="p-button-sm"
    (click)="addUser()"
    aria-label="Add user">
  </button>
</div>

<p-table
  [value]="filteredUsers"
  [paginator]="true"
  [(rows)]="rows"
  [rowsPerPageOptions]="rowsPerPageOptions"
  styleClass="p-datatable-striped"
  role="grid"
  aria-label="Users data table">

  <!-- HEADER -->
  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="id" scope="col">
        ID
        <p-sortIcon field="id"></p-sortIcon>
      </th>
      <th pSortableColumn="name" scope="col">
        Name
        <p-sortIcon field="name"></p-sortIcon>
      </th>
      <th pSortableColumn="email" scope="col">
        Email
        <p-sortIcon field="email"></p-sortIcon>
      </th>
      <th pSortableColumn="role" scope="col">
        Role
        <p-sortIcon field="role"></p-sortIcon>
      </th>
      <th scope="col">Actions</th>
    </tr>
    <tr>
      <th>
        <input
          pInputText
          type="text"
          [(ngModel)]="filterId"
          (input)="onFilterChange()"
          placeholder="Filter by ID"
          aria-label="Filter users by ID"
        />
      </th>
      <th>
        <input
          pInputText
          type="text"
          [(ngModel)]="filterName"
          (input)="onFilterChange()"
          placeholder="Filter by Name"
          aria-label="Filter users by name"
        />
      </th>
      <th>
        <input
          pInputText
          type="text"
          [(ngModel)]="filterEmail"
          (input)="onFilterChange()"
          placeholder="Filter by Email"
          aria-label="Filter users by email"
        />
      </th>
      <th>
        <input
          pInputText
          type="text"
          [(ngModel)]="filterRole"
          (input)="onFilterChange()"
          placeholder="Filter by Role"
          aria-label="Filter users by role"
        />
      </th>
      <th></th>
    </tr>
  </ng-template>

  <!-- BODY -->
  <ng-template pTemplate="body" let-user>
    <tr>
      <td>{{user.id}}</td>
      <td>{{user.name}}</td>
      <td>{{user.email}}</td>
      <td>{{user.role}}</td>
      <td class="actions-cell">
        <button
          pButton
          type="button"
          class="p-button-text p-button-sm action-btn"
          icon="pi pi-pencil"
          (click)="editUser(user)"
          aria-label="Edit user">
        </button>
        <button
          pButton
          type="button"
          class="p-button-text p-button-sm p-button-danger action-btn"
          icon="pi pi-trash"
          (click)="deleteUser(user)"
          aria-label="Delete user">
        </button>
      </td>
    </tr>
  </ng-template>

</p-table>

<p-dialog
  [(visible)]="dialogVisible"
  [modal]="true"
  [closable]="false"
  [style]="{width: '420px'}"
  [header]="dialogMode === 'add' ? 'Add User' : 'Edit User'">
  <div class="dialog-form">
    <div class="field">
      <label for="user-name">Name</label>
      <input
        id="user-name"
        pInputText
        type="text"
        [(ngModel)]="dialogUser.name"
        placeholder="Enter name"
        aria-label="User name"
      />
    </div>
    <div class="field">
      <label for="user-email">Email</label>
      <input
        id="user-email"
        pInputText
        type="email"
        [(ngModel)]="dialogUser.email"
        placeholder="Enter email"
        aria-label="User email"
      />
    </div>
    <div class="field">
      <label for="user-role">Role</label>
      <input
        id="user-role"
        pInputText
        type="text"
        [(ngModel)]="dialogUser.role"
        placeholder="Enter role"
        aria-label="User role"
      />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <div class="dialog-actions">
      <button
        pButton
        type="button"
        label="Cancel"
        class="p-button-text"
        (click)="cancelDialog()">
      </button>
      <button
        pButton
        type="button"
        label="Save"
        icon="pi pi-check"
        (click)="saveDialog()"
        [disabled]="!dialogUser.name.trim() || !dialogUser.email.trim() || !dialogUser.role.trim()">
      </button>
    </div>
  </ng-template>
</p-dialog>

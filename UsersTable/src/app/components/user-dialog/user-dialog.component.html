<p-dialog
  [visible]="visible"
  (onHide)="onHide()"
  [modal]="true"
  [closable]="false"
  [style]="{width: '420px'}"
  [header]="mode === 'add' ? 'Add User' : 'Edit User'">
  <div class="dialog-form">
    <div class="field">
      <label for="user-name">Name</label>
      <input
        id="user-name"
        pInputText
        type="text"
        [(ngModel)]="user.name"
        placeholder="Enter name"
        aria-label="User name"
      />
    </div>
    <div class="field">
      <label for="user-email">Email</label>
      <input
        id="user-email"
        pInputText
        type="email"
        [(ngModel)]="user.email"
        placeholder="Enter email"
        aria-label="User email"
      />
    </div>
    <div class="field">
      <label for="user-role">Role</label>
      <input
        id="user-role"
        pInputText
        type="text"
        [(ngModel)]="user.role"
        placeholder="Enter role"
        aria-label="User role"
      />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <div class="dialog-actions">
      <button
        pButton
        type="button"
        label="Cancel"
        class="p-button-text"
        (click)="onCancel()">
      </button>
      <button
        pButton
        type="button"
        label="Save"
        icon="pi pi-check"
        (click)="onSave()"
        [disabled]="!user.name.trim() || !user.email.trim() || !user.role.trim()">
      </button>
    </div>
  </ng-template>
</p-dialog>
